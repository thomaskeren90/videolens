<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>KlikClip — AI Viral Clip Factory</title>
  <meta name="description" content="Paste a YouTube link → AI finds 10 viral moments → download TikTok-ready clips in 5 minutes"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F5F7FA; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; color: #6B7280; font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #E5E7EB; border-top-color: #00AA13; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"><div id="loading"><div class="spinner"></div><span>Loading KlikClip...</span></div></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    fetch('./klikclip-dashboard.jsx')
      .then(function(r) { return r.text(); })
      .then(function(code) {
        var result = Babel.transform(code, { presets: ['react'] });
        var blob = new Blob([result.code], { type: 'application/javascript' });
        var url = URL.createObjectURL(blob);
        var s = document.createElement('script');
        s.src = url;
        document.body.appendChild(s);
      })
      .catch(function(e) {
        document.getElementById('loading').innerHTML = 'Error: ' + e.message;
      });
  </script>
</body>
</html>
