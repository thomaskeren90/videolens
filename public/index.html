<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>KlikClip — AI Viral Clip Factory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',-apple-system,sans-serif}
:root{--P:#00AA13;--PD:#008A0E;--PL:#E6F7E8;--BG:#F5F7FA;--W:#fff;--T:#1F2937;--TM:#6B7280;--TL:#9CA3AF;--B:#E5E7EB}
body{background:var(--BG);color:var(--T);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

.container{max-width:480px;width:100%;background:var(--W);border-radius:24px;box-shadow:0 8px 32px rgba(0,0,0,0.08);overflow:hidden;position:relative}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--B)}
.logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;color:var(--T)}
.logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(145deg,#00C416,#00690C);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,170,19,0.3)}
.badge{height:28px;padding:0 10px;border-radius:100px;background:var(--PL);display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--P)}
.hero{padding:32px 20px 24px;background:linear-gradient(160deg,#F0FFF2,#fff);text-align:center}
.hero h1{font-size:24px;font-weight:800;color:var(--T);margin-bottom:6px;line-height:1.2}
.hero p{font-size:14px;color:var(--TM);margin-bottom:20px}
.input-group{display:flex;align-items:center;gap:8px;background:var(--W);border:2px solid var(--B);border-radius:12px;padding:0 14px;height:48px;margin-bottom:10px}
.input-group input{flex:1;border:none;outline:none;font-size:14px;color:var(--T);background:transparent}
.or-divider{display:flex;align-items:center;gap:12px;margin:10px 0;font-size:12px;color:var(--TL)}
.or-divider hr{flex:1;border:none;border-top:1px solid var(--B)}
.upload-zone{border:2px dashed var(--B);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px;cursor:pointer;transition:.2s}
.upload-zone:hover{border-color:var(--P);background:var(--PL)}
.upload-zone i{font-size:24px;color:var(--TL);margin-bottom:6px}
.upload-zone p{font-size:13px;color:var(--TM)}
.upload-zone small{font-size:11px;color:var(--TL)}
.style-pills{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.pill{height:34px;padding:0 14px;border-radius:100px;border:2px solid var(--B);background:var(--W);font-size:12px;font-weight:600;color:var(--TM);cursor:pointer;transition:.2s;}
.pill.active{border-color:var(--P);background:var(--PL);color:var(--P)}
.pill:hover{border-color:var(--P)}
.select-row{display:flex;gap:12px;margin-bottom:16px}
.select-row select{flex:1;height:44px;border:2px solid var(--B);border-radius:10px;padding:0 12px;font-size:13px;color:var(--T);background:var(--W)}
.btn-gen{width:100%;height:50px;border-radius:100px;border:none;background:linear-gradient(180deg,#00C416,#00AA13);color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,170,19,0.35);margin-bottom:10px;transition:.2s}
.btn-gen:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,170,19,0.4)}
.btn-gen:active{transform:scale(0.98)}
.footer-text{font-size:12px;color:var(--TL);text-align:center}
.footer-text a{color:var(--P);font-weight:600;text-decoration:underline;cursor:pointer}

.clips-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px}
.clip-card{background:var(--W);border:1px solid var(--B);border-radius:16px;overflow:hidden;transition:.2s;cursor:pointer}
.clip-card:hover{box-shadow:0 8px 24px rgba(0,0,0,0.12);transform:translateY(-2px)}
.clip-thumb{height:120px;display:flex;align-items:center;justify-content:center;position:relative}
.clip-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 15px rgba(0,0,0,0.15)}
.clip-dur{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.6);color:#fff;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:600}
.clip-score{position:absolute;top:8px;right:8px;border-radius:100px;padding:2px 8px;font-size:10px;font-weight:700}
.clip-info{padding:10px 12px 12px}
.clip-title{font-size:12px;font-weight:600;color:var(--T);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-dl{width:100%;height:32px;border-radius:100px;border:none;background:linear-gradient(180deg,#00C416,#00AA13);color:#fff;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;box-shadow:0 3px 10px rgba(0,170,19,0.25)}
.progress-bar{width:100%;height:8px;background:var(--B);border-radius:100px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#00C416,#00AA13);transition:width .4s;box-shadow:0 0 8px rgba(0,170,19,0.3)}
.nav{display:flex;height:56px;border-top:1px solid var(--B);background:var(--W)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;background:none;border:none;font-size:10px;color:var(--TL);padding:4px 0}
.nav-item.active{color:var(--P);font-weight:700}
.nav-item i{font-size:20px}
.nav-plus{width:42px;height:42px;border-radius:50%;background:linear-gradient(145deg,#00C416,#00690C);display:flex;align-items:center;justify-content:center;color:#fff;margin-top:-16px;box-shadow:0 5px 15px rgba(0,170,19,0.4);border:none;cursor:pointer}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="top-bar">
    <div class="logo"><div class="logo-icon"><i class="ti ti-video" style="color:#fff;font-size:16px"></i></div>KlikClip</div>
    <div class="badge"><i class="ti ti-bolt" style="font-size:11px"></i> 45/50</div>
  </div>
  <div id="home-page">
    <div class="hero">
      <h1>Generate 10 Viral Clips Today</h1>
      <p>Paste a YouTube link or upload a video</p>
      <div class="input-group">
        <i class="ti ti-link" style="color:var(--TL);font-size:16px"></i>
        <input type="text" id="yt-url" placeholder="https://youtube.com/watch?v=..."/>
      </div>
      <div class="or-divider"><hr/><span>or</span><hr/></div>
      <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <i class="ti ti-upload"></i>
        <p>Click to upload video</p>
        <small>MP4, MOV, AVI · Max 1 GB</small>
        <input type="file" id="file-input" accept="video/*" style="display:none"/>
      </div>
      <div class="style-pills">
        <button class="pill active" onclick="selectStyle(this)"><i class="ti ti-microphone" style="font-size:12px"></i> Podcast</button>
        <button class="pill" onclick="selectStyle(this)"><i class="ti ti-device-gamepad" style="font-size:12px"></i> Gaming</button>
        <button class="pill" onclick="selectStyle(this)"><i class="ti ti-video" style="font-size:12px"></i> Vlog</button>
      </div>
      <div class="select-row">
        <select><option>English</option><option>Indonesian</option></select>
        <select><option>10 clips</option><option>5 clips</option><option>15 clips</option><option>20 clips</option></select>
      </div>
      <button class="btn-gen" onclick="generateClips()">🔥 Generate 10 Clips</button>
      <p class="footer-text">💡 <a>Need help? Visit the Learning Center</a></p>
    </div>
  </div>
  <div class="nav">
    <button class="nav-item active"><i class="ti ti-home"></i>Home</button>
    <button class="nav-item"><i class="ti ti-folder"></i>Projects</button>
    <button class="nav-item" style="position:relative;top:-8px"><div class="nav-plus"><i class="ti ti-plus" style="font-size:18px"></i></div></button>
    <button class="nav-item"><i class="ti ti-chart-bar"></i>Stats</button>
    <button class="nav-item"><i class="ti ti-user"></i>Account</button>
  </div>
</div>
<script>
function selectStyle(el){document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active')}
function generateClips(){
  var btn=document.querySelector('.btn-gen');
  btn.innerHTML='⏳ Generating...';
  btn.disabled=true;
  setTimeout(function(){
    btn.innerHTML='🔥 Generate 10 Clips';
    btn.disabled=false;
    document.querySelector('#home-page').innerHTML+='<div style="padding:0 20px 20px"><h3 style="font-size:15px;font-weight:700;margin-bottom:12px">Your Clips</h3><div class="clips-grid" id="clips"></div></div>';
    var clips=document.getElementById('clips');
    var data=[
      {s:92,d:'0:32',t:'Epic Moment #1',c:'#00AA13'},
      {s:78,d:'0:45',t:'Key Insight #2',c:'#F59E0B'},
      {s:85,d:'0:28',t:'Hook Opener #3',c:'#10B981'},
      {s:67,d:'0:55',t:'Reaction #4',c:'#3B82F6'},
      {s:91,d:'0:38',t:'Viral Quote #5',c:'#8B5CF6'},
      {s:74,d:'0:42',t:'Highlight #6',c:'#EF4444'},
      {s:88,d:'0:29',t:'Story Arc #7',c:'#00AA13'},
      {s:63,d:'0:50',t:'Moment #8',c:'#F59E0B'},
      {s:95,d:'0:24',t:'Power Clip #9',c:'#EC4899'},
      {s:81,d:'0:36',t:'CTA Clip #10',c:'#10B981'},
    ];
    data.forEach(function(c){
      clips.innerHTML+='<div class="clip-card"><div class="clip-thumb" style="background:linear-gradient(135deg,'+c.color+'22,'+c.color+'55)"><div class="clip-icon" style="background:linear-gradient(145deg,'+c.color+','+c.color+'cc)"><i class="ti ti-video" style="color:#fff;font-size:18px"></i></div><div class="clip-dur">'+c.d+'</div><div class="clip-score" style="background:'+c.color+'22;color:'+c.color+';border:1px solid '+c.color+'44">'+c.s+'%</div></div><div class="clip-info"><div class="clip-title">'+c.t+'</div><button class="btn-dl" onclick="alert(\'Download: '+c.t+'\')"><i class="ti ti-download" style="font-size:12px"></i> Download</button></div></div>';
    });
  },1500);
}
</script>
</body>
</html>
