<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Video Summerizer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',-apple-system,sans-serif}
:root{--P:#00AA13;--PD:#008A0E;--PL:#E6F7E8;--BG:#F5F7FA;--W:#fff;--T:#1F2937;--TM:#6B7280;--TL:#9CA3AF;--B:#E5E7EB}
body{background:var(--BG);color:var(--T);min-height:100vh}

/* Sidebar */
.sidebar{position:fixed;left:0;top:0;width:240px;height:100%;background:var(--W);border-right:1px solid var(--B);z-index:50;overflow-y:auto;padding:0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--B);border-radius:4px}
.side-header{padding:16px 16px 8px;border-bottom:1px solid var(--B)}
.side-logo{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
.side-logo span{color:var(--P)}
.side-user{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--B);cursor:pointer}
.side-avatar{width:32px;height:32px;border-radius:8px;background:var(--P);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.side-uname{font-size:13px;font-weight:600}
.side-uplan{font-size:11px;color:var(--TM)}
.side-sect{padding:8px 0;border-bottom:1px solid var(--B)}
.side-item{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;color:var(--T);cursor:pointer;transition:all .1s}
.side-item:hover{background:var(--PL)}
.side-item i{font-size:18px;color:var(--TM);width:20px;text-align:center}
.side-item .badge{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--PL);color:var(--P);margin-left:auto}
.side-invite{margin:8px 16px;padding:8px;border:1px dashed var(--B);border-radius:8px;text-align:center;font-size:12px;color:var(--TM);cursor:pointer}
.side-invite:hover{background:var(--PL);border-color:var(--P)}

/* Main Layout */
.main{margin-left:240px;min-height:100vh}
.topbar{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--W);border-bottom:1px solid var(--B);position:sticky;top:0;z-index:40}
.top-icons{display:flex;align-items:center;gap:12px}
.top-icons i{font-size:20px;color:var(--TM);cursor:pointer}
.top-icons i:hover{color:var(--P)}
.content{padding:20px;max-width:1000px;margin:0 auto}

/* Quick Actions */
.quick-actions{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.quick-actions::-webkit-scrollbar{height:3px}
.quick-actions::-webkit-scrollbar-thumb{background:var(--B);border-radius:4px}
.qa-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 16px;border:1px solid var(--B);border-radius:10px;background:var(--W);cursor:pointer;font-size:11px;color:var(--TM);white-space:nowrap;transition:all .15s;min-width:70px}
.qa-btn:hover{border-color:var(--P);color:var(--P);background:var(--PL)}
.qa-btn i{font-size:20px}

/* Drop Zone */
.drop-box{border:2px dashed var(--B);border-radius:12px;padding:32px;text-align:center;background:var(--W);cursor:pointer;transition:all .2s;margin-bottom:20px}
.drop-box:hover{border-color:var(--P);background:var(--PL)}
.drop-box i{font-size:40px;color:var(--P)}
.drop-box h3{font-size:15px;font-weight:600;margin:8px 0 4px}
.drop-box p{font-size:12px;color:var(--TM)}
.drop-box .sources{display:flex;justify-content:center;gap:16px;margin-top:12px;font-size:12px;color:var(--TL)}
.drop-box .sources span{display:flex;align-items:center;gap:4px}

/* Tabs */
.tabs{display:flex;gap:16px;border-bottom:1px solid var(--B);margin-bottom:16px}
.tab{padding:10px 0;font-size:13px;font-weight:500;color:var(--TM);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--T)}
.tab.active{color:var(--P);border-bottom-color:var(--P);font-weight:600}
.tab .count{font-size:11px;color:var(--TL);margin-left:4px}

/* Empty State */
.empty{padding:60px 0;text-align:center}
.empty i{font-size:48px;color:var(--TL)}
.empty h3{font-size:16px;font-weight:600;margin:12px 0 4px;color:var(--TM)}
.empty p{font-size:13px;color:var(--TL)}

/* Card */
.card{background:var(--W);border:1px solid var(--B);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}

/* Features Grid */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:16px}
.fcard{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 8px;border:1px solid var(--B);border-radius:10px;background:var(--W);cursor:pointer;font-size:12px;color:var(--TM);text-align:center;transition:all .15s}
.fcard:hover{border-color:var(--P);color:var(--P);background:var(--PL)}
.fcard i{font-size:24px}

/* Clip Card */
.clip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.clip-card .thumb{height:100px;background:var(--PL);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative}
.clip-card .score{position:absolute;top:6px;right:6px;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700}
.score-high{background:#D1FAE5;color:#065F46}
.score-med{background:#FEF3C7;color:#92400E}
.score-low{background:#FEE2E2;color:#991B1B}
.clip-card .info{padding:10px}
.clip-card .title{font-size:12px;font-weight:600;margin-bottom:2px}
.clip-card .meta{font-size:11px;color:var(--TM)}
.clip-card .meta i{font-size:14px;vertical-align:middle}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:200px}
  .main{margin-left:200px}
}
@media(max-width:640px){
  .sidebar{display:none}
  .main{margin-left:0}
  .content{padding:16px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const L = {
  en: {
    app:"Video Summerizer", plan:"Free Plan", createTeam:"Create team for Pro",
    captions:"Captions", thumbnail:"Thumbnail", credits:"Credit usage history",
    lang:"Language", agentOpus:"Go to Agent Opus", logout:"Logout",
    invite:"Invite member", home:"Home",
    brand:"Brand template", assets:"Asset library",
    calendar:"Calendar", analytics:"Analytics", social:"Social accounts",
    allProj:"All projects", savedProj:"Saved projects",
    dropLink:"Drop a link", upload:"Upload", gdrive:"Google Drive", getClip:"Get clip",
    l2s:"Long to Shorts", aiCap:"AI Captions", editor:"Video Editor",
    enhance:"Enhance Speech", reframe:"AI Reframe", broll:"AI B-Roll",
    hook:"AI Hook", s2v:"Script to Video",
    dropText:"Drop a link or upload to get started",
    dropSub:"Paste YouTube, TikTok, or any video URL",
    noProj:"No projects yet", noProjSub:"Create your first clip to get started",
  },
  id: {
    app:"Video Summerizer", plan:"Paket Gratis", createTeam:"Buat tim untuk Pro",
    captions:"Teks", thumbnail:"Thumbnail", credits:"Riwayat kredit",
    lang:"Bahasa", agentOpus:"Ke Agent Opus", logout:"Keluar",
    invite:"Undang anggota", home:"Beranda",
    brand:"Template merek", assets:"Pustaka aset",
    calendar:"Kalender", analytics:"Analitik", social:"Akun sosial",
    allProj:"Semua proyek", savedProj:"Proyek tersimpan",
    dropLink:"Tempel link", upload:"Unggah", gdrive:"Google Drive", getClip:"Ambil klip",
    l2s:"Panjang ke Pendek", aiCap:"Teks AI", editor:"Editor Video",
    enhance:"Perbaiki Suara", reframe:"AI Bingkai Ulang", broll:"AI B-Roll",
    hook:"AI Hook", s2v:"Naskah ke Video",
    dropText:"Tempel link atau unggah untuk memulai",
    dropSub:"Tempel URL YouTube, TikTok, atau video lainnya",
    noProj:"Belum ada proyek", noProjSub:"Buat klip pertama Anda untuk memulai",
  }
};
let lang=localStorage.getItem('vs_lang')||'en';
let t=L[lang];
let token=localStorage.getItem('vs_token');
let user=JSON.parse(localStorage.getItem('vs_user')||'null');
let page='home';
let tab='all';

function setLang(l){lang=l;localStorage.setItem('vs_lang',l);render();}
function switchTab(t){tab=t;render();}
function navigate(p){page=p;render();}

function render(){
  t=L[lang];
  document.getElementById('app').innerHTML=`
    <div class="sidebar">
      <div class="side-header">
        <div class="side-logo">🎬 <span>Video</span> Summerizer</div>
      </div>
      <div class="side-user">
        <div class="side-avatar">${user?user.email[0].toUpperCase():'?'}</div>
        <div>
          <div class="side-uname">${user?user.email.split('@')[0]:'Guest'}</div>
          <div class="side-uplan">${t.plan}</div>
        </div>
      </div>
      <div class="side-sect">
        <div class="side-item" onclick="navigate('home')"><i class="ti ti-home"></i>${t.home}</div>
        <div class="side-item"><i class="ti ti-brand-tabler"></i>${t.brand}</div>
        <div class="side-item"><i class="ti ti-folder"></i>${t.assets}</div>
      </div>
      <div class="side-sect">
        <div class="side-item"><i class="ti ti-calendar"></i>${t.calendar}</div>
        <div class="side-item"><i class="ti ti-chart-bar"></i>${t.analytics}</div>
        <div class="side-item"><i class="ti ti-link"></i>${t.social}</div>
      </div>
      <div class="side-sect">
        <div class="side-item"><i class="ti ti-user-plus"></i>${t.invite} <span style="margin-left:auto;font-size:10px;color:var(--P)">+</span></div>
      </div>
      <div class="side-sect">
        <div class="side-item"><i class="ti ti-caption"></i>${t.captions}<span class="badge">Free</span></div>
        <div class="side-item"><i class="ti ti-photo"></i>${t.thumbnail}<span class="badge">Free</span></div>
        <div class="side-item"><i class="ti ti-coin"></i>${t.credits}</div>
        <div class="side-item"><i class="ti ti-language"></i>${t.lang}
          <select onchange="setLang(this.value)" style="margin-left:auto;border:none;font-size:12px;background:transparent;color:var(--P);cursor:pointer">
            <option value="en" ${lang==='en'?'selected':''}>EN</option>
            <option value="id" ${lang==='id'?'selected':''}>ID</option>
          </select>
        </div>
        <div class="side-item"><i class="ti ti-robot"></i>${t.agentOpus}</div>
      </div>
      <div class="side-sect">
        <div class="side-item" onclick="logout()" style="color:#EF4444"><i class="ti ti-logout"></i>${t.logout}</div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div style="font-size:14px;font-weight:600">${t.app}</div>
        <div class="top-icons">
          <i class="ti ti-search" onclick="alert('Search')"></i>
          <i class="ti ti-bell" onclick="alert('Notifications')"></i>
          <div class="side-avatar" style="width:28px;height:28px;font-size:11px;cursor:pointer">${user?user.email[0].toUpperCase():'?'}</div>
        </div>
      </div>
      <div class="content">
        ${renderPage()}
      </div>
    </div>
  `;
}

function renderPage(){
  return `
    <div class="quick-actions">
      <div class="qa-btn" onclick="alert('${t.dropLink}')"><i class="ti ti-link"></i>${t.dropLink}</div>
      <div class="qa-btn" onclick="alert('${t.upload}')"><i class="ti ti-upload"></i>${t.upload}</div>
      <div class="qa-btn" onclick="alert('${t.gdrive}')"><i class="ti ti-brand-google-drive"></i>${t.gdrive}</div>
      <div class="qa-btn" onclick="alert('${t.getClip}')"><i class="ti ti-video"></i>${t.getClip}</div>
    </div>

    <div class="drop-box" onclick="document.getElementById('urlInput')?.focus()">
      <i class="ti ti-link"></i>
      <h3>${t.dropText}</h3>
      <p>${t.dropSub}</p>
      <div class="sources">
        <span><i class="ti ti-brand-youtube"></i>YouTube</span>
        <span><i class="ti ti-brand-tiktok"></i>TikTok</span>
        <span><i class="ti ti-link"></i>URL</span>
      </div>
    </div>

    <div style="margin-bottom:16px">
      <input id="urlInput" placeholder="${t.dropSub}" style="width:100%;height:44px;padding:0 14px;border:1px solid var(--B);border-radius:10px;font-size:13px;outline:none"
        onkeydown="if(event.key==='Enter')analyzeClip(this.value)"/>
    </div>

    <div class="fgrid">
      ${[t.l2s, t.aiCap, t.editor, t.enhance, t.reframe, t.broll, t.hook, t.s2v].map(f => `
        <div class="fcard"><i class="ti ti-${f===t.l2s?'aspect-ratio':f===t.aiCap?'caption':f===t.editor?'edit':f===t.enhance?'music':f===t.reframe?'crop':f===t.broll?'photo':f===t.hook?'bolt':'file-text'}"></i>${f}</div>
      `).join('')}
    </div>

    <div class="tabs" style="margin-top:24px">
      <div class="tab ${tab==='all'?'active':''}" onclick="switchTab('all')">${t.allProj} <span class="count">(0)</span></div>
      <div class="tab ${tab==='saved'?'active':''}" onclick="switchTab('saved')">${t.savedProj} <span class="count">(0)</span></div>
    </div>

    <div class="empty">
      <i class="ti ti-video-off"></i>
      <h3>${t.noProj}</h3>
      <p>${t.noProjSub}</p>
    </div>
  `;
}

async function analyzeClip(url){
  if(!url||!url.includes('youtu'))return alert('Please paste a valid URL');
  try{
    const data=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    const job=await data.json();
    alert('Processing started! Check back in a moment.');
  }catch(e){alert('Error: '+e.message);}
}

function logout(){
  localStorage.removeItem('vs_token');localStorage.removeItem('vs_user');
  user=null;token=null;render();
}

render();
</script>
</body>
</html>
