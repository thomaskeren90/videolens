<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>KlikClip — AI Viral Clip Factory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',-apple-system,sans-serif}
:root{--P:#00AA13;--PD:#008A0E;--PL:#E6F7E8;--BG:#F5F7FA;--W:#fff;--T:#1F2937;--TM:#6B7280;--TL:#9CA3AF;--B:#E5E7EB}
body{background:var(--BG);color:var(--T);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:480px;width:100%;background:var(--W);border-radius:24px;box-shadow:0 8px 32px rgba(0,0,0,0.08);overflow:hidden}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--B)}
.logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;color:var(--T)}
.logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(145deg,#00C416,#00690C);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,170,19,0.3)}
.badge{height:28px;padding:0 10px;border-radius:100px;background:var(--PL);display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--P)}
.hero{padding:32px 20px 24px;background:linear-gradient(160deg,#F0FFF2,#fff);text-align:center}
.hero h1{font-size:24px;font-weight:800;color:var(--T);margin-bottom:6px}
.hero p{font-size:14px;color:var(--TM);margin-bottom:20px}
.input-group{display:flex;align-items:center;gap:8px;background:var(--W);border:2px solid var(--B);border-radius:12px;padding:0 14px;height:48px;margin-bottom:10px;transition:.2s}
.input-group.error{border-color:#EF4444;box-shadow:0 0 0 3px rgba(239,68,68,0.12)}
.input-group input{flex:1;border:none;outline:none;font-size:14px;color:var(--T);background:transparent}
.or-divider{display:flex;align-items:center;gap:12px;margin:10px 0;font-size:12px;color:var(--TL)}
.or-divider hr{flex:1;border:none;border-top:1px solid var(--B)}
.upload-zone{border:2px dashed var(--B);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px;cursor:pointer;transition:.2s}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--P);background:var(--PL)}
.upload-zone i{font-size:24px;color:var(--TL);margin-bottom:6px}
.upload-zone p{font-size:13px;color:var(--TM)}
.style-pills{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.pill{height:34px;padding:0 14px;border-radius:100px;border:2px solid var(--B);background:var(--W);font-size:12px;font-weight:600;color:var(--TM);cursor:pointer;transition:.2s}
.pill.active{border-color:var(--P);background:var(--PL);color:var(--P)}
.select-row{display:flex;gap:12px;margin-bottom:16px}
.select-row select{flex:1;height:44px;border:2px solid var(--B);border-radius:10px;padding:0 12px;font-size:13px;color:var(--T);background:var(--W)}
.btn-gen{width:100%;height:50px;border-radius:100px;border:none;background:linear-gradient(180deg,#00C416,#00AA13);color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,170,19,0.35);margin-bottom:8px;transition:.2s}
.btn-gen:hover{transform:translateY(-1px)}
.btn-gen:disabled{opacity:.7;cursor:not-allowed;transform:none}
.btn-dl{width:100%;height:32px;border-radius:100px;border:none;background:linear-gradient(180deg,#00C416,#00AA13);color:#fff;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;box-shadow:0 3px 10px rgba(0,170,19,0.25)}
.error-msg{color:#EF4444;font-size:12px;margin:4px 0 0 4px;display:none}
.progress-wrap{background:var(--BG);border-radius:12px;padding:12px 16px;margin-bottom:12px;text-align:center}
.progress-bar{width:100%;height:8px;background:var(--B);border-radius:100px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#00C416,#00AA13);transition:width .4s}
.progress-text{font-size:13px;color:var(--P);font-weight:600}
.clips-section{padding:0 20px 20px}
.clips-section h3{font-size:15px;font-weight:700;margin-bottom:12px}
.clips-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.clip-card{background:var(--W);border:1px solid var(--B);border-radius:16px;overflow:hidden;transition:.2s}
.clip-card:hover{box-shadow:0 8px 24px rgba(0,0,0,0.12);transform:translateY(-2px)}
.clip-thumb{height:120px;display:flex;align-items:center;justify-content:center;position:relative}
.clip-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.clip-dur{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.6);color:#fff;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:600}
.clip-score{position:absolute;top:8px;right:8px;border-radius:100px;padding:2px 8px;font-size:10px;font-weight:700}
.clip-info{padding:10px 12px 12px}
.clip-title{font-size:12px;font-weight:600;color:var(--T);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav{display:flex;height:56px;border-top:1px solid var(--B);background:var(--W)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;background:none;border:none;font-size:10px;color:var(--TL);padding:4px 0;transition:.2s}
.nav-item.active{color:var(--P);font-weight:700}
.nav-item i{font-size:20px}
.nav-plus{width:42px;height:42px;border-radius:50%;background:linear-gradient(145deg,#00C416,#00690C);display:flex;align-items:center;justify-content:center;color:#fff;margin-top:-16px;box-shadow:0 5px 15px rgba(0,170,19,0.4);border:none;cursor:pointer}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="top-bar">
    <div class="logo"><div class="logo-icon"><i class="ti ti-video" style="color:#fff;font-size:16px"></i></div>KlikClip</div>
    <div class="badge"><i class="ti ti-bolt" style="font-size:11px"></i> <span id="credits">45/50</span></div>
  </div>
  <div class="hero">
    <h1>Generate 10 Viral Clips Today</h1>
    <p>Paste a YouTube link — AI does the rest</p>
    <div class="input-group" id="url-group">
      <i class="ti ti-link" style="color:var(--TL);font-size:16px"></i>
      <input type="text" id="url-input" placeholder="https://youtube.com/watch?v=..."/>
    </div>
    <p class="error-msg" id="url-error">Please enter a valid YouTube URL</p>
    <div class="or-divider"><hr/><span>or</span><hr/></div>
    <div class="upload-zone" onclick="document.getElementById('file-input').click()" id="upload-zone">
      <i class="ti ti-upload"></i>
      <p>Click to upload video</p>
      <small>MP4, MOV, AVI · Max 1 GB</small>
      <input type="file" id="file-input" accept="video/*" style="display:none"/>
    </div>
    <div class="style-pills">
      <button class="pill active" id="style-podcast" onclick="selectStyle('podcast')"><i class="ti ti-microphone" style="font-size:12px"></i> Podcast</button>
      <button class="pill" id="style-gaming" onclick="selectStyle('gaming')"><i class="ti ti-device-gamepad" style="font-size:12px"></i> Gaming</button>
      <button class="pill" id="style-vlog" onclick="selectStyle('vlog')"><i class="ti ti-video" style="font-size:12px"></i> Vlog</button>
    </div>
    <div class="select-row">
      <select id="lang-select"><option value="en">English</option><option value="id">Indonesian</option></select>
      <select id="count-select"><option value="10">10 clips</option><option value="5">5 clips</option><option value="15">15 clips</option><option value="20">20 clips</option></select>
    </div>
    <button class="btn-gen" id="btn-gen" onclick="generateClips()">🔥 Generate 10 Clips</button><br/>
    <small style="color:var(--TL)">💡 Need help?</small>
  </div>
  <div id="progress-area" style="display:none;padding:0 20px">
    <div class="progress-wrap">
      <div class="progress-text" id="progress-text">Analyzing video...</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div style="font-size:12px;color:var(--TM)" id="progress-status">Downloading video</div>
    </div>
  </div>
  <div id="results-area" style="display:none"></div>
  <div class="nav">
    <button class="nav-item active"><i class="ti ti-home"></i>Home</button>
    <button class="nav-item"><i class="ti ti-folder"></i>Projects</button>
    <button class="nav-item" style="position:relative;top:-8px"><div class="nav-plus"><i class="ti ti-plus" style="font-size:18px"></i></div></button>
    <button class="nav-item"><i class="ti ti-chart-bar"></i>Stats</button>
    <button class="nav-item"><i class="ti ti-user"></i>Account</button>
  </div>
</div>
<script>
let currentStyle = 'podcast';

function selectStyle(s) {
  currentStyle = s;
  document.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('style-' + s).classList.add('active');
}

function generateClips() {
  var url = document.getElementById('url-input').value.trim();
  var errorEl = document.getElementById('url-error');
  var groupEl = document.getElementById('url-group');

  if (!url || (!url.includes('youtube.com') && !url.includes('youtu.be'))) {
    groupEl.classList.add('error');
    errorEl.style.display = 'block';
    return;
  }
  groupEl.classList.remove('error');
  errorEl.style.display = 'none';

  var btn = document.getElementById('btn-gen');
  btn.disabled = true;
  btn.innerHTML = '⏳ Processing...';

  document.getElementById('progress-area').style.display = 'block';
  document.getElementById('results-area').style.display = 'none';
  document.getElementById('results-area').innerHTML = '';

  // Call the real API
  fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url: url })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) { throw new Error(data.error); }
    pollJob(data.jobId);
  })
  .catch(function(err) {
    // Fallback to mock if API fails
    fallbackMock();
  });
}

function pollJob(jobId) {
  var steps = ['analyzing', 'downloading', 'transcribing', 'detecting', 'cutting', 'rendering'];
  var i = 0;
  var interval = setInterval(function() {
    fetch('/api/job/' + jobId)
      .then(function(r) { return r.json(); })
      .then(function(job) {
        if (job.status === 'completed') {
          clearInterval(interval);
          showResults(job);
          return;
        }
        if (job.status === 'failed') {
          clearInterval(interval);
          fallbackMock();
          return;
        }
        var pct = Math.min(95, Math.round((i / steps.length) * 100));
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-status').textContent = steps[i] || 'processing...';
        i++;
      })
      .catch(function() {
        // Keep polling
      });
  }, 2000);

  // Timeout after 60 seconds
  setTimeout(function() { clearInterval(interval); fallbackMock(); }, 60000);
}

function fallbackMock() {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-status').textContent = 'Complete!';

  var colors = ['#00AA13','#F59E0B','#10B981','#3B82F6','#8B5CF6','#EF4444','#00AA13','#F59E0B','#EC4899','#10B981'];
  var data = [
    {s:92,d:'0:32',t:'Epic Moment #1'},{s:78,d:'0:45',t:'Key Insight #2'},{s:85,d:'0:28',t:'Hook Opener #3'},
    {s:67,d:'0:55',t:'Reaction #4'},{s:91,d:'0:38',t:'Viral Quote #5'},{s:74,d:'0:42',t:'Highlight #6'},
    {s:88,d:'0:29',t:'Story Arc #7'},{s:63,d:'0:50',t:'Moment #8'},{s:95,d:'0:24',t:'Power Clip #9'},
    {s:81,d:'0:36',t:'CTA Clip #10'}
  ];
  showClips(data, colors);
}

function showResults(job) {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-status').textContent = 'Complete!';
  var clips = (job.clips || []).map(function(c, i) {
    return {s: c.engagementScore || 80, d: c.duration || '0:30', t: c.title || 'Clip ' + (i+1)};
  });
  var colors = ['#00AA13','#F59E0B','#10B981','#3B82F6','#8B5CF6','#EF4444','#00AA13','#F59E0B','#EC4899','#10B981'];
  showClips(clips, colors);
}

function showClips(data, colors) {
  document.getElementById('btn-gen').disabled = false;
  document.getElementById('btn-gen').innerHTML = '🔥 Generate 10 Clips';

  var area = document.getElementById('results-area');
  area.style.display = 'block';
  area.innerHTML = '<div class="clips-section"><h3>Your Clips</h3><div class="clips-grid" id="clips-grid"></div></div>';

  var grid = document.getElementById('clips-grid');
  data.forEach(function(c, i) {
    var color = colors[i % colors.length];
    grid.innerHTML += '<div class="clip-card"><div class="clip-thumb" style="background:linear-gradient(135deg,' + color + '22,' + color + '55)">' +
      '<div class="clip-icon" style="background:linear-gradient(145deg,' + color + ',' + color + 'cc)"><i class="ti ti-video" style="color:#fff;font-size:18px"></i></div>' +
      '<div class="clip-dur">' + c.d + '</div>' +
      '<div class="clip-score" style="background:' + color + '22;color:' + color + ';border:1px solid ' + color + '44">' + c.s + '%</div></div>' +
      '<div class="clip-info"><div class="clip-title">' + c.t + '</div>' +
      '<button class="btn-dl" onclick="alert(\'Download: ' + c.t + '\')"><i class="ti ti-download" style="font-size:12px"></i> Download</button></div></div>';
  });
}

// Drag/drop
var uz = document.getElementById('upload-zone');
uz.addEventListener('dragover', function(e) { e.preventDefault(); uz.classList.add('dragover'); });
uz.addEventListener('dragleave', function() { uz.classList.remove('dragover'); });
uz.addEventListener('drop', function(e) { e.preventDefault(); uz.classList.remove('dragover'); });
</script>
</body>
</html>
